<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>CrossStitch</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #f5f0eb;
      --surface: #ffffff;
      --surface2: #fdf8f5;
      --border: #e8ddd5;
      --text: #2d1f18;
      --text2: #7a5e52;
      --accent: #c0624a;
      --accent2: #e8957a;
      --accent-light: #fde8e2;
      --green: #5a9a6e;
      --green-light: #e2f5e9;
      --gold: #c9963a;
      --gold-light: #fdf3e0;
      --radius: 16px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --nav-height: 64px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1210;
        --surface: #261a16;
        --surface2: #2f201a;
        --border: #3d2820;
        --text: #f5ede8;
        --text2: #b89080;
        --accent: #b86050;
        --accent2: #c87868;
        --accent-light: #3d1f18;
        --green: #52936a;
        --green-light: #1a3020;
        --gold: #b88c38;
        --gold-light: #3a2a10;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: calc(var(--nav-height) + 16px);
      overflow-x: hidden;
    }

    /* ---- HEADER ---- */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-date {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }
    .header-no-stitch {
      font-size: 12px;
      color: var(--text2);
      margin-top: 3px;
    }
    .fortune-btn {
      background: var(--accent-light);
      border: none;
      border-radius: 12px;
      padding: 8px 14px;
      font-size: 15px;
      cursor: pointer;
      color: var(--accent);
      font-weight: 600;
      transition: opacity 0.15s;
    }
    .fortune-btn:active { opacity: 0.7; }

    /* ---- PAGES ---- */
    .page { display: none; padding: 16px; }
    .page.active { display: block; }

    /* ---- STITCH INPUT ---- */
    .stitch-input-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
      display: none;
    }
    .stitch-input-card.visible { display: block; }
    .input-label {
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 8px;
      font-weight: 500;
    }
    .counter-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .counter-btn {
      width: 40px; height: 40px;
      border-radius: 12px;
      border: none;
      font-size: 20px;
      font-weight: 300;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.1s, opacity 0.1s;
      flex-shrink: 0;
    }
    .counter-btn:active { transform: scale(0.92); }
    .btn-minus { background: var(--surface2); color: var(--text2); border: 1.5px solid var(--border); }
    .btn-plus { background: color-mix(in srgb, var(--accent) 70%, var(--surface)); color: white; }
    .counter-input {
      flex: 1;
      min-width: 0;
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 6px;
      background: var(--bg);
      outline: none;
      -moz-appearance: textfield;
      box-sizing: border-box;
    }
    .counter-input::-webkit-inner-spin-button,
    .counter-input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .counter-input:focus { border-color: var(--accent); }
    .save-btn {
      width: 100%;
      background: color-mix(in srgb, var(--accent) 70%, var(--surface));
      color: white;
      border: none;
      border-radius: 12px;
      padding: 11px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .save-btn:active { opacity: 0.85; transform: scale(0.98); }
    .save-btn:disabled { opacity: 0.5; cursor: default; }

    /* ---- TOAST ---- */
    .toast {
      position: fixed;
      bottom: calc(var(--nav-height) + 20px);
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text);
      color: var(--bg);
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 200;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ---- PROJECT CARDS ---- */
    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }
    .projects-list { display: flex; flex-direction: column; gap: 8px; }
    .project-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 10px 14px;
      box-shadow: var(--shadow);
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.2s, transform 0.1s;
      position: relative;
      overflow: hidden;
    }
    .project-card:active { transform: scale(0.98); }
    .project-card.selected {
      border-color: var(--accent);
    }
    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 7px;
    }
    .card-name {
      font-weight: 700;
      font-size: 14px;
      color: var(--text);
      flex: 1;
      padding-right: 26px;
    }
    .card-today {
      font-size: 11px;
      color: var(--green);
      font-weight: 600;
      background: var(--green-light);
      padding: 2px 7px;
      border-radius: 7px;
    }
    .progress-bar-wrap {
      height: 5px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 6px;
    }
    .progress-bar {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--accent), var(--green));
      transition: width 0.5s ease;
    }
    .card-meta {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text2);
    }
    .card-norm {
      color: var(--gold);
      font-weight: 600;
    }
    .card-norm.done { color: var(--green); }

    /* ---- WEEKLY STATS ---- */
    .week-header {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 8px 14px;
      margin-bottom: 10px;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .week-date { font-size: 12px; color: var(--text2); margin-bottom: 2px; }
    .week-total { font-size: 22px; font-weight: 800; color: var(--accent); }
    .week-total-label { font-size: 12px; color: var(--text2); }
    .stat-item {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 8px 14px;
      margin-bottom: 6px;
      box-shadow: var(--shadow);
    }
    .stat-name { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
    .stat-bottom { display: flex; justify-content: space-between; align-items: baseline; }
    .stat-count { font-size: 14px; color: var(--text); }
    .stat-norm { font-size: 14px; color: var(--text2); }
    .no-data {
      text-align: center;
      color: var(--text2);
      font-size: 15px;
      padding: 40px 20px;
    }
    .no-data-emoji { font-size: 40px; display: block; margin-bottom: 10px; }

    /* ---- WEEK DAY HISTOGRAM ---- */
    .day-chart {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px 14px 10px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
    }
    .day-chart-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }
    .day-bars {
      display: flex;
      align-items: flex-end;
      gap: 5px;
      height: 72px;
    }
    .day-bar-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100%;
      justify-content: flex-end;
    }
    .day-bar-count {
      font-size: 9px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 3px;
      min-height: 12px;
      line-height: 12px;
    }
    .day-bar-count.zero { color: transparent; }
    .day-bar {
      width: 100%;
      border-radius: 4px 4px 0 0;
      background: linear-gradient(180deg, var(--accent), var(--accent2));
      transition: height 0.5s ease;
    }
    .day-bar.today-bar {
      background: linear-gradient(180deg, var(--green), #8bc99e);
    }
    .day-bar.empty-bar { background: var(--border); }
    .day-bar-name {
      font-size: 11px;
      color: var(--text2);
      margin-top: 5px;
      font-weight: 500;
    }
    .day-bar-name.today-name { color: var(--accent); font-weight: 700; }

    /* ---- YEARLY STATS ---- */
    .year-header {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 8px 14px;
      margin-bottom: 10px;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .year-total { font-size: 22px; font-weight: 800; color: var(--accent); }
    .year-total-label { font-size: 12px; color: var(--text2); }
    .year-subtitle { font-size: 12px; color: var(--text2); margin-bottom: 2px; }
    .month-chart {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px 14px 10px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
    }
    .month-bars {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 100px;
    }
    .month-bar-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100%;
      justify-content: flex-end;
    }
    .month-bar-count {
      font-size: 7px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 3px;
      min-height: 10px;
      line-height: 10px;
      text-align: center;
    }
    .month-bar-count.zero { color: transparent; }
    .month-bar {
      width: 100%;
      border-radius: 4px 4px 0 0;
      background: linear-gradient(180deg, var(--accent), var(--accent2));
      transition: height 0.5s ease;
    }
    .month-bar.current-bar {
      background: linear-gradient(180deg, var(--green), #8bc99e);
    }
    .month-bar.future-bar { background: var(--border); }
    .month-bar-name {
      font-size: 9px;
      color: var(--text2);
      margin-top: 5px;
      font-weight: 500;
    }
    .month-bar-name.current-name { color: var(--accent); font-weight: 700; }

    /* ---- YEAR EXTRA STATS ---- */
    .year-extra-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 4px;
    }
    .year-stat-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px 12px;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .year-stat-value {
      font-size: 26px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1.1;
    }
    .year-stat-label {
      font-size: 11px;
      color: var(--text2);
      margin-top: 4px;
      line-height: 1.3;
    }

    /* ---- MANAGE PROJECTS PAGE ---- */
    .add-project-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      background: color-mix(in srgb, var(--accent) 70%, var(--surface));
      color: white;
      border: none;
      border-radius: var(--radius);
      padding: 13px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 14px;
      transition: opacity 0.15s, transform 0.1s;
    }
    .add-project-btn:active { opacity: 0.85; transform: scale(0.98); }

    .manage-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 12px 14px;
      box-shadow: var(--shadow);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .manage-card-info { flex: 1; min-width: 0; }
    .manage-card-name { font-weight: 700; font-size: 14px; color: var(--text); margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .manage-card-norm { font-size: 12px; color: var(--text2); }
    .edit-btn, .finish-btn {
      background: color-mix(in srgb, var(--accent) 70%, var(--surface));
      border: none;
      border-radius: 10px;
      padding: 8px;
      cursor: pointer;
      color: white;
      flex-shrink: 0;
      transition: opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
    }
    .edit-btn:active, .finish-btn:active { opacity: 0.7; }
    .manage-card-actions { display: flex; gap: 6px; flex-shrink: 0; }

    /* ---- PROJECT FORM MODAL ---- */
    .form-modal {
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      padding: 24px 20px 40px;
      width: 100%;
      max-width: 500px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .modal-overlay.show .form-modal { transform: translateY(0); }
    .form-modal-title { font-size: 20px; font-weight: 800; margin-bottom: 20px; }
    .form-field { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 16px;
      color: var(--text);
      background: var(--bg);
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--accent); }
    .form-hint { font-size: 11px; color: var(--text2); margin-top: 4px; }
    .form-actions { display: flex; gap: 10px; margin-top: 20px; }
    .form-submit {
      flex: 1;
      background: color-mix(in srgb, var(--accent) 70%, var(--surface));
      color: white;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .form-submit:disabled { opacity: 0.5; cursor: default; }
    .form-cancel {
      background: var(--surface2);
      color: var(--text2);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 14px 20px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    /* ---- LOADER ---- */
    .loader {
      text-align: center;
      padding: 40px 20px;
      color: var(--text2);
      font-size: 15px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- BOTTOM NAV ---- */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--nav-height);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 100;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 11px;
      color: var(--text2);
      font-weight: 500;
      gap: 3px;
      transition: color 0.2s;
    }
    .nav-item.active { color: var(--accent); }
    .nav-icon { font-size: 22px; }

    /* ---- FORTUNE MODAL ---- */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 300;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      padding: 24px 24px 40px;
      width: 100%;
      max-width: 500px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      text-align: center;
    }
    .modal-overlay.show .modal { transform: translateY(0); }
    .modal-icon { font-size: 48px; margin-bottom: 12px; }
    .modal-title { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .modal-subtitle { font-size: 15px; color: var(--text2); margin-bottom: 24px; }
    .modal-project {
      background: var(--accent-light);
      color: var(--accent);
      font-size: 18px;
      font-weight: 700;
      padding: 14px 20px;
      border-radius: 14px;
      margin-bottom: 20px;
    }
    .modal-btn {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 10px;
    }
    .modal-btn-secondary {
      width: 100%;
      background: transparent;
      color: var(--text2);
      border: none;
      padding: 10px;
      font-size: 15px;
      cursor: pointer;
    }
    /* ---- CONFIRM DIALOG ---- */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 400;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      padding: 24px;
    }
    .confirm-overlay.show { opacity: 1; pointer-events: all; }
    .confirm-dialog {
      background: var(--surface);
      border-radius: 20px;
      padding: 28px 24px 20px;
      width: 100%;
      max-width: 340px;
      transform: scale(0.93);
      transition: transform 0.2s cubic-bezier(0.34, 1.4, 0.64, 1);
    }
    .confirm-overlay.show .confirm-dialog { transform: scale(1); }
    .confirm-dialog-title {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--text);
    }
    .confirm-dialog-body {
      font-size: 14px;
      color: var(--text2);
      line-height: 1.5;
      margin-bottom: 24px;
    }
    .confirm-dialog-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    .confirm-btn-cancel {
      background: transparent;
      border: 1.5px solid var(--border, rgba(255,255,255,0.12));
      color: var(--text2);
      border-radius: 12px;
      padding: 10px 20px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .confirm-btn-ok {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 10px 24px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div>
      <div class="header-date" id="headerDate">—</div>
      <div class="header-no-stitch"><span id="headerDaysNoStitch">—</span> дн. без вышивки</div>
    </div>
    <button class="fortune-btn" onclick="showFortune()">🎡 Фортуна</button>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <div class="nav-item active" id="nav-today" onclick="switchPage('today')">
    <span class="nav-icon">🪡</span>
    Вышиваем
  </div>
  <div class="nav-item" id="nav-week" onclick="switchPage('week')">
    <span class="nav-icon">📊</span>
    Неделя
  </div>
  <div class="nav-item" id="nav-year" onclick="switchPage('year')">
    <span class="nav-icon">📅</span>
    Год
  </div>
  <div class="nav-item" id="nav-projects" onclick="switchPage('projects')">
    <span class="nav-icon">🗂️</span>
    Проекты
  </div>
</nav>

<!-- PAGE: TODAY -->
<div class="page active" id="page-today">
  <!-- Project list -->
  <div class="section-title">Выбери проект</div>
  <div class="projects-list" id="todayProjectList">
    <div class="loader"><div class="spinner"></div>Загружаем проекты…</div>
  </div>
</div>

<!-- PAGE: WEEK -->
<div class="page" id="page-week">
  <div id="weekContent">
    <div class="loader"><div class="spinner"></div>Загружаем статистику…</div>
  </div>
</div>

<!-- PAGE: YEAR -->
<div class="page" id="page-year">
  <div id="yearContent">
    <div class="loader"><div class="spinner"></div>Загружаем…</div>
  </div>
</div>

<!-- PAGE: PROJECTS -->
<div class="page" id="page-projects">
  <button class="add-project-btn" onclick="openProjectForm(null)">+ Добавить проект</button>
  <div class="section-title">Активные проекты</div>
  <div id="manageProjectList">
    <div class="loader"><div class="spinner"></div>Загружаем…</div>
  </div>
</div>

<!-- PROJECT FORM MODAL -->
<div class="modal-overlay" id="projectFormModal" onclick="closeProjectForm(event)">
  <div class="form-modal">
    <div class="form-modal-title" id="formModalTitle">Новый проект</div>
    <div class="form-field">
      <label class="form-label" for="formName">Название</label>
      <input class="form-input" type="text" id="formName" placeholder="Моя вышивка" maxlength="80" autocomplete="off" />
    </div>
    <div class="form-field">
      <label class="form-label" for="formDesigner">Дизайнер / Схема <span style="color:var(--text2);font-weight:400">(необязательно)</span></label>
      <input class="form-input" type="text" id="formDesigner" placeholder="Например, Dimensions" maxlength="100" autocomplete="off" />
    </div>
    <div class="form-field">
      <label class="form-label" for="formTotalStitches">Крестики (общее количество) <span style="color:var(--text2);font-weight:400">(необязательно)</span></label>
      <input class="form-input" type="number" id="formTotalStitches" placeholder="0" min="0" inputmode="numeric" />
    </div>
    <div class="form-field">
      <label class="form-label" for="formFinishDate">Желаемая дата завершения <span style="color:var(--text2);font-weight:400">(необязательно)</span></label>
      <input class="form-input" type="date" id="formFinishDate" />
      <div class="form-hint">Норма рассчитывается автоматически по формуле в таблице</div>
    </div>
    <div class="form-field" id="formNormPreview" style="display:none">
      <div class="form-label">Текущая норма</div>
      <div id="formNormValue" style="font-size:18px;font-weight:700;color:var(--accent)"></div>
    </div>
    <div class="form-actions">
      <button class="form-cancel" onclick="closeProjectFormModal()">Отмена</button>
      <button class="form-submit" id="formSubmitBtn" onclick="submitProjectForm()">Сохранить</button>
    </div>
  </div>
</div>

<!-- FORTUNE MODAL -->
<div class="modal-overlay" id="fortuneModal" onclick="closeFortune(event)">
  <div class="modal">
    <div class="modal-icon">🎡</div>
    <div class="modal-title">Фортуна выбрала!</div>
    <div class="modal-subtitle">Сегодня вышиваем:</div>
    <div class="modal-project" id="fortuneProject"></div>
    <button class="modal-btn" onclick="selectFortuneProject()">Выбрать этот проект</button>
    <button class="modal-btn-secondary" onclick="showFortune()">Крутить ещё раз</button>
    <button class="modal-btn-secondary" onclick="closeFortuneModal()">Отмена</button>
  </div>
</div>

<!-- CONFIRM DIALOG -->
<div class="confirm-overlay" id="confirmDialog">
  <div class="confirm-dialog">
    <div class="confirm-dialog-title" id="confirmTitle"></div>
    <div class="confirm-dialog-body" id="confirmBody"></div>
    <div class="confirm-dialog-actions">
      <button class="confirm-btn-cancel" id="confirmCancel">Отмена</button>
      <button class="confirm-btn-ok" id="confirmOk">OK</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  // =====================================================
  // НАСТРОЙКА — замени на свой URL
  // =====================================================
  const GAS_URL = "https://script.google.com/macros/s/AKfycbzMmxjJZXunD_9vTh2q4mDzEaIT81lzpRLLLNkTgXvqDvYNt8j5nBM7iZ_763ofL4s/exec";

  // =====================================================
  // Telegram WebApp init
  // =====================================================
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
    // Применяем цвета Telegram если они есть
    const tp = tg.themeParams;
    if (tp) {
      if (tp.bg_color) document.documentElement.style.setProperty('--bg', tp.bg_color);
      if (tp.secondary_bg_color) document.documentElement.style.setProperty('--surface', tp.secondary_bg_color);
      if (tp.text_color) document.documentElement.style.setProperty('--text', tp.text_color);
      if (tp.hint_color) document.documentElement.style.setProperty('--text2', tp.hint_color);
      if (tp.button_color) document.documentElement.style.setProperty('--accent', tp.button_color);
      if (tp.button_text_color) document.documentElement.style.setProperty('--accent-text', tp.button_text_color);
    }
  }

  // =====================================================
  // State
  // =====================================================
  let projects = [];
  let selectedProject = null;
  let fortuneSelected = null;
  let savedScrollY = 0;

  // =====================================================
  // Init
  // =====================================================
  function init() {
    setHeaderDate();
    loadProjects();
    loadDaysNoStitch();
  }

  async function loadDaysNoStitch() {
    try {
      const data = await apiGet({ action: 'getYearlyStats' });
      if (data.daysNoStitch != null) {
        document.getElementById('headerDaysNoStitch').textContent = data.daysNoStitch;
      }
    } catch (e) {}
  }

  function setHeaderDate() {
    const now = new Date();
    const days = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
    const months = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
    document.getElementById('headerDate').textContent =
      days[now.getDay()] + ', ' + now.getDate() + ' ' + months[now.getMonth()];
  }

  // =====================================================
  // API calls
  // =====================================================
  async function apiGet(params) {
    const url = GAS_URL + '?' + new URLSearchParams(params).toString();
    const resp = await fetch(url, { cache: 'no-store' });
    return resp.json();
  }

  async function loadProjects() {
    try {
      const data = await apiGet({ action: 'getProjects' });
      projects = data.projects || [];
      renderTodayProjects();
    } catch (err) {
      document.getElementById('todayProjectList').innerHTML =
        '<div class="no-data"><span class="no-data-emoji">⚠️</span>Ошибка загрузки.<br>Проверь URL в коде.</div>';
    }
  }

  async function loadYearlyStats() {
    const el = document.getElementById('yearContent');
    el.innerHTML = '<div class="loader"><div class="spinner"></div>Загружаем…</div>';
    try {
      const data = await apiGet({ action: 'getYearlyStats' });
      renderYearlyStats(data);
    } catch (err) {
      el.innerHTML = '<div class="no-data"><span class="no-data-emoji">⚠️</span>Ошибка загрузки.</div>';
    }
  }

  async function loadWeeklyStats() {
    const el = document.getElementById('weekContent');
    el.innerHTML = '<div class="loader"><div class="spinner"></div>Загружаем…</div>';
    try {
      const data = await apiGet({ action: 'getWeeklyStats' });
      renderWeeklyStats(data);
    } catch (err) {
      el.innerHTML = '<div class="no-data"><span class="no-data-emoji">⚠️</span>Ошибка загрузки.</div>';
    }
  }

  // =====================================================
  // Rendering
  // =====================================================
  function renderTodayProjects() {
    const list = document.getElementById('todayProjectList');
    if (!projects.length) {
      list.innerHTML = '<div class="no-data"><span class="no-data-emoji">🎉</span>Все проекты завершены!</div>';
      return;
    }
    let html = '';
    projects.forEach((p, i) => {
      html += projectCardHTML(p, true, i);
      if (selectedProject && selectedProject.name === p.name) {
        html += stitchInputHTML(p);
      }
    });
    list.innerHTML = html;
  }

  function stitchInputHTML(p) {
    const val = p.todayCount || 0;
    return `
      <div class="stitch-input-card visible" id="stitchInputCard">
        <div class="input-label">Сколько крестиков сегодня?</div>
        <div class="counter-row">
          <button class="counter-btn btn-minus" onclick="changeCount(-1)">−</button>
          <input type="number" class="counter-input" id="countInput" value="${val}" min="0" inputmode="numeric" />
          <button class="counter-btn btn-plus" onclick="changeCount(1)">+</button>
        </div>
        <button class="save-btn" id="saveBtn" onclick="saveStitches()">Сохранить</button>
      </div>`;
  }

  function projectCardHTML(p, clickable, idx) {
    const pct = Math.round(p.progress * 100);
    const hasTodayCount = p.todayCount > 0;
    const normDone = p.weeklyNorm > 0 && p.leftWeek <= 0;
    const isSelected = selectedProject && selectedProject.name === p.name;

    const normText = p.weeklyNorm > 0
      ? (normDone ? '✅ Норма выполнена' : `осталось ${p.leftWeek} кр. из ${p.weeklyNorm}`)
      : '';

    return `
      <div class="project-card${hasTodayCount ? ' done-today' : ''}${isSelected ? ' selected' : ''}"
           id="proj-card-${idx}"
           onclick="${clickable ? `selectProject('${escapeJs(p.name)}')` : ''}">
        <div class="card-top">
          <div class="card-name">${escapeHtml(p.name)}</div>
          ${hasTodayCount ? `<div class="card-today">+${p.todayCount} сегодня</div>` : ''}
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-bar" style="width:${pct}%"></div>
        </div>
        <div class="card-meta">
          <span>${pct}% выполнено</span>
          ${normText ? `<span class="card-norm${normDone ? ' done' : ''}">${normText}</span>` : ''}
        </div>
      </div>`;
  }

  function renderYearlyStats(data) {
    const el = document.getElementById('yearContent');
    const months = data.months || [];
    const year = data.year || new Date().getFullYear();
    const totalYear = data.totalYear || 0;
    const nowMonth = new Date().getMonth(); // 0-based

    const monthNames = ['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
    const maxVal = Math.max(...months.map(m => m.total), 1);

    function fmtShort(val) {
      if (val === 0) return '0';
      return val >= 1000 ? (val / 1000).toFixed(1).replace('.0', '') + 'к' : val.toString();
    }

    const barsHTML = months.map(m => {
      const idx = m.month - 1;
      const isCurrent = idx === nowMonth;
      const isFuture = idx > nowMonth;
      const heightPct = isFuture ? 4 : Math.max(4, Math.round((m.total / maxVal) * 100));
      const isEmpty = m.total === 0;
      return `
        <div class="month-bar-col">
          <div class="month-bar-count${isEmpty && !isFuture ? ' zero' : ''}">${isFuture ? '' : fmtShort(m.total)}</div>
          <div class="month-bar${isCurrent ? ' current-bar' : isFuture ? ' future-bar' : ''}" style="height:${heightPct}%"></div>
          <div class="month-bar-name${isCurrent ? ' current-name' : ''}">${monthNames[idx]}</div>
        </div>`;
    }).join('');

    const extraStats = `
      <div class="year-extra-stats">
        <div class="year-stat-card">
          <div class="year-stat-value">${data.currentStreak || '—'}</div>
          <div class="year-stat-label">Текущая серия</div>
        </div>
        <div class="year-stat-card">
          <div class="year-stat-value">${data.maxStreak || '—'}</div>
          <div class="year-stat-label">Максимальная серия</div>
        </div>
        <div class="year-stat-card">
          <div class="year-stat-value">${data.finishYear || '—'}</div>
          <div class="year-stat-label">Вышью до конца года</div>
        </div>
      </div>`;

    el.innerHTML = `
      <div class="year-header">
        <div class="year-subtitle">${year} год</div>
        <div class="year-total">${totalYear.toLocaleString('ru')}</div>
        <div class="year-total-label">крестиков за год</div>
      </div>
      <div class="month-chart">
        <div class="month-bars">${barsHTML}</div>
      </div>
      ${extraStats}`;
  }

  function renderDayChart(dayTotals) {
    const dayNames = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
    const jsDay = new Date().getDay(); // 0=Sun
    const todayIdx = jsDay === 0 ? 6 : jsDay - 1; // 0=Пн..6=Вс
    const maxVal = Math.max(...dayTotals, 1);

    const barsHTML = dayTotals.map((val, i) => {
      const isToday = i === todayIdx;
      const isEmpty = val === 0;
      const heightPct = isEmpty ? 4 : Math.max(4, Math.round((val / maxVal) * 100));
      return `
        <div class="day-bar-col">
          <div class="day-bar-count${isEmpty ? ' zero' : ''}">${isEmpty ? '0' : val}</div>
          <div class="day-bar${isToday ? ' today-bar' : isEmpty ? ' empty-bar' : ''}" style="height:${heightPct}%"></div>
          <div class="day-bar-name${isToday ? ' today-name' : ''}">${dayNames[i]}</div>
        </div>`;
    }).join('');

    return `<div class="day-chart">
      <div class="day-chart-label">По дням недели</div>
      <div class="day-bars">${barsHTML}</div>
    </div>`;
  }

  function renderWeeklyStats(data) {
    const el = document.getElementById('weekContent');
    const stats = data.stats || {};
    const keys = Object.keys(stats);
    const dayTotals = data.dayTotals || new Array(7).fill(0);

    if (!keys.length) {
      el.innerHTML = `
        <div class="week-header">
          <div class="week-date">${data.dateRange || ''}</div>
          <div class="week-total">0</div>
          <div class="week-total-label">крестиков за неделю</div>
        </div>
        ${renderDayChart(dayTotals)}
        <div class="no-data"><span class="no-data-emoji">🪡</span>Записей за эту неделю пока нет.</div>`;
      return;
    }

    const maxDone = Math.max(...keys.map(k => stats[k].done));

    let itemsHTML = keys
      .sort((a, b) => stats[b].done - stats[a].done)
      .map(proj => {
        const s = stats[proj];
        const barPct = maxDone > 0 ? Math.round((s.done / maxDone) * 100) : 0;
        const normPct = s.norm > 0 ? Math.min(100, Math.round((s.done / s.norm) * 100)) : null;
        const leftNorm = s.norm > 0 ? s.norm - s.done : 0;
        return `
          <div class="stat-item">
            <div class="stat-name">${escapeHtml(proj)}</div>
            <div class="stat-bottom">
              <span class="stat-count">Вышито ${s.done} кр.</span>
              ${s.norm > 0 ? `<span class="stat-norm">До нормы ${leftNorm} (${normPct}%)</span>` : ''}
            </div>
          </div>`;
      }).join('');

    el.innerHTML = `
      <div class="week-header">
        <div class="week-date">${data.dateRange || ''}</div>
        <div class="week-total">${data.totalSum}</div>
        <div class="week-total-label">крестиков за неделю</div>
      </div>
      ${renderDayChart(dayTotals)}
      ${itemsHTML}`;
  }

  // =====================================================
  // Project selection
  // =====================================================
  function selectProject(name) {
    const project = projects.find(p => p.name === name);
    if (!project) return;

    // Toggle: повторный клик — скрыть поле и вернуть скролл
    if (selectedProject && selectedProject.name === name) {
      clearSelected();
      return;
    }

    // Запоминаем текущий скролл
    savedScrollY = window.scrollY;
    selectedProject = project;

    renderTodayProjects();

    // Скроллим карточку к верху (под хедером)
    setTimeout(() => {
      const idx = projects.findIndex(p => p.name === name);
      const card = document.getElementById(`proj-card-${idx}`);
      if (card) {
        const headerHeight = (document.querySelector('.header')?.offsetHeight || 0) + 8;
        const y = card.getBoundingClientRect().top + window.scrollY - headerHeight;
        window.scrollTo({ top: y, behavior: 'smooth' });
      }
    }, 50);
  }

  function clearSelected() {
    selectedProject = null;
    renderTodayProjects();
    const scrollTo = savedScrollY;
    savedScrollY = 0;
    setTimeout(() => {
      window.scrollTo({ top: scrollTo, behavior: 'smooth' });
    }, 50);
  }

  // =====================================================
  // Counter
  // =====================================================
  function changeCount(delta) {
    const input = document.getElementById('countInput');
    const val = Math.max(0, (parseInt(input.value) || 0) + delta);
    input.value = val;
  }

  // =====================================================
  // Save stitches
  // =====================================================
  async function saveStitches() {
    if (!selectedProject) return;

    const count = parseFloat(document.getElementById('countInput').value) || 0;
    const btn = document.getElementById('saveBtn');
    btn.disabled = true;
    btn.textContent = 'Сохраняем…';

    try {
      const data = await apiGet({
        action: 'logStitches',
        project: selectedProject.name,
        count: count
      });

      if (data.success) {
        // Update local state
        selectedProject.todayCount = count;
        selectedProject.leftWeek = data.leftWeek;
        selectedProject.progress = data.progress;
        const idx = projects.findIndex(p => p.name === selectedProject.name);
        if (idx !== -1) projects[idx] = { ...projects[idx], ...selectedProject };

        let msg = `✅ ${count} кр. сохранено!`;
        if (data.progress >= 1) msg = '🎉 ФИНИШ! Проект завершён!';
        else if (data.leftWeek <= 0) msg = '🎉 Недельная норма выполнена!';
        else if (data.leftWeek > 0) msg += ` Осталось: ${data.leftWeek} кр.`;

        showToast(msg);
        renderTodayProjects();
      } else {
        showToast('Ошибка сохранения 😢');
      }
    } catch (err) {
      showToast('Ошибка сети 😢');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Сохранить';
    }
  }

  // =====================================================
  // Fortune
  // =====================================================
  function showFortune() {
    if (!projects.length) { showToast('Нет активных проектов!'); return; }
    const p = projects[Math.floor(Math.random() * projects.length)];
    fortuneSelected = p;
    document.getElementById('fortuneProject').textContent = p.name;
    document.getElementById('fortuneModal').classList.add('show');
  }

  function selectFortuneProject() {
    closeFortuneModal();
    if (fortuneSelected) {
      switchPage('today');
      selectProject(fortuneSelected.name);
    }
  }

  function closeFortuneModal() {
    document.getElementById('fortuneModal').classList.remove('show');
  }

  function showConfirm(title, body) {
    return new Promise(resolve => {
      const overlay = document.getElementById('confirmDialog');
      document.getElementById('confirmTitle').textContent = title;
      document.getElementById('confirmBody').textContent = body;
      overlay.classList.add('show');
      function finish(result) {
        overlay.classList.remove('show');
        document.getElementById('confirmOk').onclick = null;
        document.getElementById('confirmCancel').onclick = null;
        overlay.onclick = null;
        resolve(result);
      }
      document.getElementById('confirmOk').onclick = () => finish(true);
      document.getElementById('confirmCancel').onclick = () => finish(false);
      overlay.onclick = e => { if (e.target === overlay) finish(false); };
    });
  }

  function closeFortune(e) {
    if (e.target === document.getElementById('fortuneModal')) closeFortuneModal();
  }

  // =====================================================
  // Navigation
  // =====================================================
  function switchPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    document.getElementById('nav-' + name).classList.add('active');

    if (name === 'week') loadWeeklyStats();
    if (name === 'year') loadYearlyStats();
    if (name === 'projects') loadProjects().then(() => renderManageProjects());
  }

  // =====================================================
  // Toast
  // =====================================================
  let toastTimer;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
  }

  // =====================================================
  // Helpers
  // =====================================================
  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escapeJs(s) {
    return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  }

  // =====================================================
  // Projects management
  // =====================================================
  let editingProject = null; // null = add new, otherwise project object

  function renderManageProjects() {
    const list = document.getElementById('manageProjectList');
    if (!projects.length) {
      list.innerHTML = '<div class="no-data"><span class="no-data-emoji">🗂️</span>Нет активных проектов.</div>';
      return;
    }
    list.innerHTML = projects.map(p => {
      const parts = p.finishDate ? p.finishDate.split('.') : [];
      const hasRealDate = parts.length === 3 && parts[2] !== '2099';
      const dateStr = hasRealDate ? 'Срок: ' + p.finishDate : '';
      const normStr = p.weeklyNorm > 0 ? 'Норма: ' + p.weeklyNorm + ' кр./нед.' : '';
      const meta = [dateStr, normStr].filter(Boolean).join(' · ') || 'Без срока и нормы';
      return `
      <div class="manage-card">
        <div class="manage-card-info">
          <div class="manage-card-name">${escapeHtml(p.name)}</div>
          <div class="manage-card-norm">${meta}</div>
        </div>
        <div class="manage-card-actions">
          <button class="finish-btn" onclick="finishProject('${escapeJs(p.name)}')" title="Завершить">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </button>
          <button class="edit-btn" onclick="openProjectForm('${escapeJs(p.name)}')" title="Изменить">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
        </div>
      </div>`;
    }).join('');
  }

  function formatDateForInput(ddmmyyyy) {
    if (!ddmmyyyy) return '';
    const parts = ddmmyyyy.split('.');
    if (parts.length !== 3 || parts[2] === '2099') return '';
    return `${parts[2]}-${parts[1]}-${parts[0]}`;
  }

  function openProjectForm(projectName) {
    editingProject = projectName ? projects.find(p => p.name === projectName) : null;
    document.getElementById('formModalTitle').textContent = editingProject ? 'Изменить проект' : 'Новый проект';
    document.getElementById('formName').value = editingProject ? editingProject.name : '';
    document.getElementById('formDesigner').value = editingProject ? (editingProject.designer || '') : '';
    document.getElementById('formTotalStitches').value = editingProject ? (editingProject.totalStitches || '') : '';
    document.getElementById('formFinishDate').value = editingProject ? formatDateForInput(editingProject.finishDate) : '';
    const preview = document.getElementById('formNormPreview');
    if (editingProject && editingProject.weeklyNorm > 0) {
      preview.style.display = '';
      document.getElementById('formNormValue').textContent = editingProject.weeklyNorm + ' кр./нед.';
    } else {
      preview.style.display = 'none';
    }
    document.getElementById('formSubmitBtn').disabled = false;
    document.getElementById('formSubmitBtn').textContent = 'Сохранить';
    document.getElementById('projectFormModal').classList.add('show');
    setTimeout(() => document.getElementById('formName').focus(), 350);
  }

  function closeProjectFormModal() {
    document.getElementById('projectFormModal').classList.remove('show');
  }

  function closeProjectForm(e) {
    if (e.target === document.getElementById('projectFormModal')) closeProjectFormModal();
  }

  async function finishProject(name) {
    const project = projects.find(p => p.name === name);
    if (!project) return;
    if (!project.totalRemaining || project.totalRemaining <= 0) {
      showToast('Проект уже на 100%!');
      return;
    }
    const confirmed = await showConfirm(
      `Завершить «${name}»?`,
      `Оставшиеся ${project.totalRemaining} кр. будут записаны сегодня, прогресс станет 100%.`
    );
    if (!confirmed) return;
    try {
      const data = await apiGet({ action: 'finishProject', name });
      if (data.success) {
        showToast('🎉 Проект завершён!');
        const freshData = await apiGet({ action: 'getProjects' });
        projects = freshData.projects || [];
        renderManageProjects();
        renderTodayProjects();
      } else {
        showToast(data.error || 'Ошибка');
      }
    } catch (err) {
      showToast('Ошибка сети 😢');
    }
  }

  async function submitProjectForm() {
    const name = document.getElementById('formName').value.trim();
    const designer = document.getElementById('formDesigner').value.trim();
    const totalStitches = document.getElementById('formTotalStitches').value.trim();
    const finishDate = document.getElementById('formFinishDate').value; // "YYYY-MM-DD" or ""

    if (!name) { showToast('Введи название проекта'); return; }

    const btn = document.getElementById('formSubmitBtn');
    btn.disabled = true;
    btn.textContent = 'Сохраняем…';

    try {
      let params;
      if (editingProject) {
        params = { action: 'updateProject', originalName: editingProject.name, name, designer, totalStitches, finishDate };
      } else {
        params = { action: 'addProject', name, designer, totalStitches, finishDate };
      }

      const data = await apiGet(params);
      if (data.success) {
        const normMsg = data.weeklyNorm > 0 ? ` Норма: ${data.weeklyNorm} кр./нед.` : '';
        closeProjectFormModal();
        showToast((editingProject ? '✅ Проект обновлён!' : '✅ Проект добавлен!') + normMsg);
        // Перезагружаем список проектов
        const freshData = await apiGet({ action: 'getProjects' });
        projects = freshData.projects || [];
        renderManageProjects();
        renderTodayProjects();
      } else {
        showToast(data.error || 'Ошибка сохранения');
      }
    } catch (err) {
      showToast('Ошибка сети 😢');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Сохранить';
    }
  }

  // =====================================================
  // Start
  // =====================================================
  init();
</script>
</body>
</html>
